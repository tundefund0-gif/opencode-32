<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>OpenCode-32</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,Segoe UI,Helvetica,Arial,sans-serif;background:#0d1117;color:#c9d1d9;height:100vh;display:flex;flex-direction:column}
#chat{flex:1;overflow-y:auto;padding:12px 16px}
.msg{margin:8px 0;padding:10px 14px;border-radius:8px;max-width:85%;line-height:1.5;word-wrap:break-word;white-space:pre-wrap}
.msg.user{background:#1f6feb1a;margin-left:auto;border:1px solid #1f6feb33;color:#e6edf3}
.msg.assistant{background:#161b22;margin-right:auto;border:1px solid #30363d}
.msg.error{background:#da36331a;margin-right:auto;border:1px solid #da363333;color:#ff7b72}
.msg.system{text-align:center;color:#8b949e;font-size:13px;padding:4px;margin:2px 0}
#bar{display:flex;padding:8px 12px;gap:8px;border-top:1px solid #21262d;background:#0d1117}
#inp{flex:1;background:#161b22;border:1px solid #30363d;border-radius:6px;color:#c9d1d9;padding:10px 12px;font-size:14px;outline:none;resize:none;font-family:inherit;min-height:42px}
#inp:focus{border-color:#1f6feb}
#btn{background:#238636;color:#fff;border:none;border-radius:6px;padding:10px 20px;cursor:pointer;font-size:14px;font-weight:500;white-space:nowrap}
#btn:hover{background:#2ea043}
#btn:disabled{background:#23863666;cursor:not-allowed}
#gear{position:fixed;top:12px;right:12px;z-index:100;background:0 0;border:1px solid #30363d;color:#8b949e;padding:6px 10px;border-radius:6px;cursor:pointer;font-size:16px;line-height:1}
#gear:hover{color:#c9d1d9;border-color:#c9d1d9}
#settings{display:none;position:fixed;top:0;right:0;width:320px;height:100%;background:#161b22;border-left:1px solid #30363d;z-index:200;padding:20px;overflow-y:auto;box-shadow:-4px 0 12px #00000044}
#settings.open{display:block}
#settings h3{margin:0 0 16px;font-size:16px;color:#e6edf3}
#settings label{display:block;margin:12px 0 4px;font-size:13px;color:#8b949e}
#settings input,#settings select{width:100%;background:#0d1117;border:1px solid #30363d;border-radius:6px;color:#c9d1d9;padding:8px 10px;font-size:14px;outline:none}
#settings input:focus{border-color:#1f6feb}
#settings button{background:#21262d;color:#c9d1d9;border:1px solid #30363d;border-radius:6px;padding:8px 16px;cursor:pointer;margin-top:16px;font-size:13px}
#settings button:hover{background:#30363d}
#overlay{display:none;position:fixed;top:0;left:0;width:100%;height:100%;z-index:150}
#overlay.open{display:block}
pre,code{font-family:ui-monospace,SFMono-Regular,Cascadia Code,Consolas,monospace;font-size:13px}
code{background:#0d1117;padding:2px 5px;border-radius:3px}
pre{background:#0d1117;padding:10px 12px;border-radius:6px;overflow-x:auto;margin:6px 0;border:1px solid #21262d}
pre code{background:0 0;padding:0}
@media(max-width:600px){.msg{max-width:95%}#bar{flex-direction:column}#btn{width:100%}#settings{width:100%}}
</style>
</head>
<body>

<div id=chat></div>

<div id=bar>
<textarea id=inp rows=2 placeholder="Type a message... (Enter to send, Shift+Enter for newline)" autofocus></textarea>
<button id=btn>Send</button>
</div>

<button id=gear title="Settings">&#9881;</button>

<div id=overlay></div>
<div id=settings>
<h3>Settings</h3>
<label>Provider</label>
<select id=sel-provider>
<option value="">Default</option>
<option value="opencode">OpenCode Zen</option>
<option value="openai">OpenAI</option>
<option value="anthropic">Anthropic</option>
<option value="google">Google Gemini</option>
<option value="groq">Groq</option>
<option value="ollama">Ollama (local)</option>
<option value="lmstudio">LM Studio (local)</option>
<option value="openrouter">OpenRouter</option>
</select>
<label>Model</label>
<input id=sel-model placeholder="e.g. opencode/big-pickle">
<label>API Key</label>
<input id=sel-key type=password placeholder="Leave blank for config">
<button id=settings-close>Close</button>
</div>

<script>
(function(){
let msgs=[], sid=Date.now().toString(36), streaming=false
const chat=document.getElementById('chat'), inp=document.getElementById('inp'), btn=document.getElementById('btn')
const gear=document.getElementById('gear'), settings=document.getElementById('settings'), overlay=document.getElementById('overlay')
const selProvider=document.getElementById('sel-provider'), selModel=document.getElementById('sel-model'), selKey=document.getElementById('sel-key')

function add(role, text) {
  const d=document.createElement('div')
  d.className='msg '+role
  d.textContent=text
  chat.appendChild(d)
  chat.scrollTop=chat.scrollHeight
  return d
}

function escapeHtml(s) {
  return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;')
}

function toggleSettings(show) {
  const o = show !== undefined ? show : !settings.classList.contains('open')
  settings.classList.toggle('open', o)
  overlay.classList.toggle('open', o)
}

gear.onclick = () => toggleSettings()
overlay.onclick = () => toggleSettings(false)
document.getElementById('settings-close').onclick = () => toggleSettings(false)

btn.onclick = async () => {
  const text = inp.value.trim()
  if (!text || streaming) return
  inp.value = ''
  streaming = true
  btn.disabled = true
  btn.textContent = '...'

  add('user', text)
  msgs.push({ role: 'user', content: text })

  const ta = add('assistant', '')
  let fullContent = ''
  let error = null

  const params = new URLSearchParams({ sid })
  const model = selModel.value.trim()
  const key = selKey.value.trim()
  const provider = selProvider.value
  if (model) params.set('model', model)
  if (key) params.set('key', key)
  if (provider) params.set('provider', provider)

  try {
    const res = await fetch('/chat?' + params.toString(), {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ messages: msgs })
    })

    if (!res.ok) {
      const errText = await res.text().catch(() => 'Unknown error')
      throw new Error(errText || `HTTP ${res.status}`)
    }

    const reader = res.body.getReader()
    const decoder = new TextDecoder()
    let buffer = ''

    while (true) {
      const { done, value } = await reader.read()
      if (done) break

      buffer += decoder.decode(value, { stream: true })
      const lines = buffer.split('\n')
      buffer = lines.pop() || ''

      for (const line of lines) {
        const trimmed = line.trim()
        if (!trimmed.startsWith('data: ')) continue

        const data = trimmed.slice(6).trim()

        if (data === '[DONE]') continue

        try {
          const event = JSON.parse(data)
          if (event.error) {
            error = event.error
            break
          }
          if (event.content !== undefined) {
            fullContent += event.content
            ta.textContent = fullContent
            chat.scrollTop = chat.scrollHeight
          }
          if (event.done) {
            if (event.msgs) msgs = event.msgs
          }
        } catch(e) {
          // skip unparseable events
        }
      }
      if (error) break
    }
  } catch(e) {
    error = e.message
  }

  if (error) {
    ta.className = 'msg error'
    ta.textContent = fullContent || 'Error: ' + error
  } else if (fullContent) {
    ta.className = 'msg assistant'
  } else {
    ta.parentNode.removeChild(ta)
  }

  streaming = false
  btn.disabled = false
  btn.textContent = 'Send'
  inp.focus()
}

inp.addEventListener('keydown', function(e) {
  if (e.key === 'Enter' && !e.shiftKey) {
    e.preventDefault()
    btn.click()
  }
})

// Load current config
fetch('/config')
  .then(r => r.json())
  .then(c => {
    if (c.model) selModel.value = c.model
    if (c.provider) selProvider.value = c.provider
  })
  .catch(() => {})

add('system', 'OpenCode-32 Web UI — type a message to start')
})()
</script>
</body>
</html>
