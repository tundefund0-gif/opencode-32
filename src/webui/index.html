<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name=viewport content="width=device-width,initial-scale=1">
<title>OpenCode-32</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,sans-serif;background:#0d1117;color:#c9d1d9;height:100vh;display:flex;flex-direction:column}
#chat{flex:1;overflow-y:auto;padding:16px}
.msg{margin:8px 0;padding:12px;border-radius:8px;max-width:80%;line-height:1.5;
word-wrap:break-word;white-space:pre-wrap}
.msg.user{background:#1f6feb22;margin-left:auto;border:1px solid #1f6feb44}
.msg.assistant{background:#30363d;margin-right:auto}
.msg.tool{color:#8b949e;font-size:0.85em;border-left:3px solid #30363d;margin-left:16px}
#input-area{display:flex;padding:12px;border-top:1px solid #30363d;background:#0d1117;gap:8px}
#input{flex:1;background:#161b22;border:1px solid #30363d;border-radius:6px;color:#c9d1d9;
padding:10px 12px;font-size:14px;outline:none;resize:none}
#input:focus{border-color:#58a6ff}
#send{background:#238636;color:#fff;border:none;border-radius:6px;padding:10px 20px;cursor:pointer;font-size:14px}
#send:hover{background:#2ea043}
code{background:#161b22;padding:2px 4px;border-radius:3px}
pre{background:#161b22;padding:12px;border-radius:6px;overflow-x:auto;margin:8px 0;border:1px solid #30363d}
.settings-btn{position:fixed;top:12px;right:12px;z-index:100;background:#21262d;
border:1px solid #30363d;color:#c9d1d9;padding:6px 12px;border-radius:6px;cursor:pointer;font-size:13px}
@media(max-width:600px){.msg{max-width:95%}#input-area{flex-wrap:wrap}#send{width:100%}}
</style>
</head>
<body>
<button class=settings-btn onclick="toggleSettings()">⚙</button>
<div id=settings style="display:none;position:fixed;top:0;right:0;z-index:200;
background:#161b22;padding:16px;border-left:1px solid #30363d;width:300px;height:100%">
<h3 style=margin-bottom:12px>Settings</h3>
<label style=display:block;margin:8px 0;font-size:13px;color:#8b949e>Model</label>
<input id=sel-model style="width:100%;background:#0d1117;border:1px solid #30363d;
border-radius:6px;color:#c9d1d9;padding:8px;font-size:14px;margin-bottom:8px"
placeholder="opencode/big-pickle">
<label style=display:block;margin:8px 0;font-size:13px;color:#8b949e>API Key</label>
<input id=sel-key type=password style="width:100%;background:#0d1117;border:1px solid #30363d;
border-radius:6px;color:#c9d1d9;padding:8px;font-size:14px;margin-bottom:8px"
placeholder="optional">
<button onclick="closeSettings()" style="background:#238636;color:#fff;border:none;
border-radius:6px;padding:8px 16px;cursor:pointer;margin-top:8px">Close</button>
</div>
<div id=chat></div>
<div id=input-area>
<textarea id=input rows=2 placeholder="Type a message..." autofocus></textarea>
<button id=send>Send</button>
</div>
<script>
let msgs=[],sid=Date.now().toString(36)
const chat=document.getElementById('chat'),inp=document.getElementById('input'),snd=document.getElementById('send')
function add(r,c){const d=document.createElement('div');d.className='msg '+r
d.textContent=c;chat.appendChild(d);chat.scrollTop=chat.scrollHeight;return d}
function toggleSettings(){const s=document.getElementById('settings');s.style.display=s.style.display==='none'?'block':'none'}
function closeSettings(){document.getElementById('settings').style.display='none'}
snd.onclick=async()=>{const t=inp.value.trim();if(!t)return;inp.value=''
add('user',t);msgs.push({role:'user',content:t});const ta=add('assistant','Thinking...')
let full='';const model=document.getElementById('sel-model').value||'opencode/big-pickle'
const key=document.getElementById('sel-key').value||''
try{const r=await fetch('/chat?sid='+sid+'&model='+encodeURIComponent(model)+'&key='+encodeURIComponent(key),{method:'POST',body:JSON.stringify({messages:msgs})})
if(!r.ok){ta.textContent='Error '+(await r.text());return}
const rd=r.body.getReader(),dc=new TextDecoder();let buf=''
while(true){const{done,value}=await rd.read();if(done)break;buf+=dc.decode(value,{stream:true})
const ls=buf.split('\n');buf=ls.pop()||''
for(const l of ls){if(!l.startsWith('data: '))continue;const d=l.slice(6)
if(d==='[DONE]')break;try{const j=JSON.parse(d)
if(j.error){ta.textContent='Error: '+j.error;break}
if(j.content){full+=j.content;ta.textContent=full}
if(j.done){msgs=j.msgs||msgs;ta.className='msg assistant'}}catch{}}}
}catch(e){ta.textContent='Error: '+e.message}}
inp.addEventListener('keydown',e=>{if(e.key==='Enter'&&!e.shiftKey){e.preventDefault();snd.onclick()}})
fetch('/config').then(r=>r.json()).then(c=>{if(c.model)document.getElementById('sel-model').value=c.model})
</script>
</body>
</html>
